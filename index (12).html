<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOTUS: Segmentação</title>
<link rel="icon" href="https://energia.fotus.com.br/wp-content/uploads/2025/02/LOGO_Fotus-1A-e1739992227141.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#0D518E;--blue-light:#1A6BB5;--blue-pale:#E7E7E7;
  --orange:#FAB515;--teal:#00B2C8;--green:#00C07A;--red:#E53935;
  --gray-50:#F8F9FC;--gray-100:#F0F2F7;--gray-200:#E2E6EF;
  --gray-400:#9BA3B8;--gray-600:#5A6375;--gray-800:#454444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:white;border-radius:24px;padding:48px 40px;width:420px;box-shadow:0 8px 40px rgba(13,81,142,.12);text-align:center;}
.logo{width:64px;height:64px;margin:0 auto 24px;overflow:hidden;border-radius:16px;}
.logo img{width:100%;height:100%;object-fit:contain;}
h1{font-size:22px;font-weight:700;margin-bottom:6px;}
.sub{font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--gray-400);text-transform:uppercase;margin-bottom:24px;}
.badge{display:inline-block;background:var(--blue-pale);color:var(--blue);font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;letter-spacing:.06em;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .5s ease both;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="https://energia.fotus.com.br/wp-content/uploads/2025/02/LOGO_Fotus-1A-e1739992227141.png" alt="FOTUS">
  </div>
  <h1>FOTUS: Segmentação</h1>
  <p class="sub">Plataforma em construção</p>
  <span class="badge">🚀 Em breve</span>
</div>
</body>
</html>
